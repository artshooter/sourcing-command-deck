<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>寻源作战台</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="noise"></div>
  <div class="grid"></div>

  <main class="page-shell">
    <div id="homeSection">
    <header class="top-bar">
      <img src="/logo.webp" alt="Savana" class="brand-logo" />
    </header>

    <section class="hero-banner">
      <h1>企划定向，智能寻源</h1>
      <p class="hero-desc">
        仅需上传企划文件，AI自主完成企划理解、商家寻源与匹配评估
      </p>
    </section>

    <section class="command-layout">
      <aside class="glow-card agent-panel">
        <div class="eyebrow">智能Agent</div>
        <div class="agent-list">
          <article class="agent-card">
            <div class="agent-name">企划理解</div>
            <div class="agent-desc">读取企划、识别结构、拆解企划款</div>
          </article>
          <article class="agent-card">
            <div class="agent-name">自动寻源</div>
            <div class="agent-desc">自动召回候选供应商与样本商品</div>
          </article>
          <article class="agent-card">
            <div class="agent-name">分层推荐</div>
            <div class="agent-desc">评估匹配质量，输出 A/B/C 推荐层级</div>
          </article>
        </div>
      </aside>

      <section class="hero-center">
        <div class="mission-panel glow-card">
          <div class="panel-header">
            <span class="dot"></span>
            <span>开启入口</span>
          </div>
          <form id="uploadForm" class="upload-form">
            <label class="dropzone" for="planning_file">
              <input id="planning_file" name="planning_file" type="file" accept=".xlsx" required />
              <div class="dropzone-inner">
                <svg class="dropzone-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M24 32V16M24 16L18 22M24 16L30 22" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M8 30V36C8 38.2091 9.79086 40 12 40H36C38.2091 40 40 38.2091 40 36V30" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <div class="dropzone-title">拖入企划文件，或点此选择</div>
                <div class="dropzone-subtitle">请按照模版填写并导入企划文件(.xlsx)</div>
                <a href="/template.xlsx" download class="template-download" onclick="event.stopPropagation()">
                  <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 2v8M8 10L5 7M8 10l3-3M3 13h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                  下载企划模版
                </a>
              </div>
              <div id="fileInfo" class="file-info hidden">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M9 1H4a1 1 0 00-1 1v12a1 1 0 001 1h8a1 1 0 001-1V5L9 1z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M9 1v4h4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                <span id="fileName"></span>
                <button type="button" id="fileClear" class="file-clear" onclick="event.stopPropagation()">&times;</button>
              </div>
            </label>


            <input name="max_items" type="hidden" value="5" />
            <input name="queries" type="hidden" value="2" />
            <input name="pages" type="hidden" value="1" />
            <input name="top_k" type="hidden" value="10" />

            <div id="cookieStatus" class="cookie-status"></div>

            <button id="submitBtn" class="primary-btn" type="submit">开始智能寻源</button>
          </form>
        </div>
      </section>

    </section>

    <section id="statusSection" class="status-section hidden">
      <div class="section-title-row">
        <div>
          <div class="eyebrow">任务执行状态</div>
        </div>
        <div id="jobBadge" class="job-badge">任务队列中</div>
      </div>

      <div class="status-grid">
        <div class="glow-card progress-card">
          <div class="progress-ring-wrap">
            <svg class="progress-ring" viewBox="0 0 120 120">
              <circle cx="60" cy="60" r="48" class="ring-bg"></circle>
              <circle cx="60" cy="60" r="48" class="ring-fg" id="ringFg"></circle>
            </svg>
            <div class="ring-center">
              <div id="progressValue" class="progress-value">0%</div>
            </div>
          </div>
          <div class="progress-info">
            <div id="stageText" class="stage-text">等待启动</div>
            <div id="fileText" class="muted"></div>
          </div>
        </div>
        <div class="glow-card preview-card">
          <div class="panel-header">
            <span class="dot"></span>
            <span>企划解析预览</span>
          </div>
          <div id="previewBox" class="preview-box muted">上传后会在这里显示识别到的企划款预览。</div>
        </div>
      </div>
    </section>
    </div>

    <section id="resultsSection" class="results-section hidden">
      <button id="backBtn" class="back-btn">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M12.5 15L7.5 10L12.5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        返回首页
      </button>

      <div id="overviewCards" class="hidden"></div>

      <section class="deck-layout">
        <aside class="glow-card item-sidebar">
          <div class="panel-header"><span class="dot"></span><span>企划款列表</span></div>
          <div id="sidebarStats" class="sidebar-stats"></div>
          <div id="plannedStrip" class="planned-strip vertical scroll-container"></div>
        </aside>

        <section class="deck-main">
          <div id="currentBriefCard" class="hidden"></div>

          <div class="glow-card tier-panel">
            <div class="panel-header"><span class="dot"></span><span>供应商分层</span></div>
            <div id="tierTabs" class="tier-tabs"></div>
            <div id="supplierGrid" class="supplier-grid scroll-container"></div>
            <div id="supplierNav" class="supplier-nav" style="display:none">
              <span id="supplierNavInfo" class="supplier-nav-info"></span>
              <div class="supplier-nav-btns">
                <button id="supplierPrev" class="supplier-nav-btn" title="上一页"><svg viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8L10 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
                <button id="supplierNext" class="supplier-nav-btn" title="下一页"><svg viewBox="0 0 16 16" fill="none"><path d="M6 4L10 8L6 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
              </div>
            </div>
          </div>
        </section>

        <div id="insightPanel" class="hidden"></div>
      </section>

      <pre id="summaryMarkdown" class="hidden"></pre>
    </section>
  </main>

  <!-- Cookie 设置弹窗 -->
  <div id="cookieModal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content glow-card">
      <div class="panel-header"><span class="dot"></span><span>配置 1688 Cookie</span></div>
      <p class="muted" style="margin:8px 0 12px">粘贴完整的 1688 cookie 字符串（登录后从浏览器开发者工具中获取）</p>
      <textarea id="cookieInput" rows="4" placeholder="粘贴 cookie 字符串..." style="width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#fff;padding:10px;font-size:13px;resize:vertical"></textarea>
      <div style="display:flex;gap:8px;margin-top:12px;justify-content:flex-end">
        <button id="cookieCancelBtn" class="primary-btn" style="background:rgba(255,255,255,0.08);min-width:60px">取消</button>
        <button id="cookieSaveBtn" class="primary-btn" style="min-width:60px">保存</button>
      </div>
    </div>
  </div>

  <!-- Toast 提示 -->
  <div id="toastContainer" class="toast-container"></div>

  <script src="/app.js"></script>
</body>
</html>
